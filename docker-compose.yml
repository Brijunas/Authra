services:
  postgres:
    image: postgres:18-alpine
    container_name: authra-postgres
    environment:
      POSTGRES_USER: authra
      POSTGRES_PASSWORD: authra_dev_password
      POSTGRES_DB: authra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authra -d authra"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: authra-mailpit
    ports:
      - "8025:8025"  # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  api:
    build: .
    container_name: authra-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=authra;Username=authra;Password=authra_dev_password"
      Smtp__Host: mailpit
      Smtp__Port: 1025
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
